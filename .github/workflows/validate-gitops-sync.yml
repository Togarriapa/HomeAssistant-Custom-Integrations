name: Validate GitOps Sync app

on:
  pull_request:
    paths:
      - "gitops_sync/**"
      - "repository.yaml"
      - ".github/workflows/validate-gitops-sync.yml"
  push:
    branches:
      - main
    paths:
      - "gitops_sync/**"
      - "repository.yaml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Reject executable or Python syntax errors
        run: |
          python3 -m py_compile gitops_sync/app/main.py gitops_sync/app/bootstrap.py
          test "$(head -n 1 gitops_sync/rootfs/etc/services.d/gitops-sync/run)" = "#!/usr/bin/with-contenv bashio"

      - name: Validate YAML files
        run: |
          python3 - <<'PY'
          import pathlib
          import yaml

          for name in ("repository.yaml", "gitops_sync/config.yaml"):
              with pathlib.Path(name).open(encoding="utf-8") as stream:
                  yaml.safe_load(stream)
          PY

      - name: Build amd64 app image
        run: docker build --pull --tag ha-gitops-sync:test gitops_sync
